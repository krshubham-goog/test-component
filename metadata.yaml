name: secure-cloud-storage-bucket
display_name: Secure Cloud Storage Bucket
version: 1.0.0
description: An enterprise-grade, secure Google Cloud Storage bucket with uniform access, encryption, and lifecycle management.
category: Storage
icon: storage

inputs:
  project_id:
    type: string
    title: Project ID
    description: The ID of the GCP project where the bucket will be created.
  name:
    type: string
    title: Bucket Name
    description: The name of the GCS bucket. Must be globally unique.
  location:
    type: string
    title: Location
    description: The location of the bucket (e.g., US, EU, us-central1).
    default: US
  storage_class:
    type: string
    title: Storage Class
    description: The Storage Class of the bucket (STANDARD, NEARLINE, COLDLINE, ARCHIVE).
    default: STANDARD
  versioning_enabled:
    type: boolean
    title: Enable Versioning
    description: While set to true, versioning is enabled on this bucket.
    default: true
  kms_key_name:
    type: string
    title: KMS Key Name
    description: Optional Cloud KMS key resource name to encrypt objects.
    default: null
  force_destroy:
    type: boolean
    title: Force Destroy
    description: Delete all contained objects when the bucket is deleted.
    default: false
  labels:
    type: object
    title: Labels
    description: A mapping of labels to assign to the bucket.
    default: {}

outputs:
  bucket_name:
    title: Bucket Name
    description: The name of the GCS bucket.
  bucket_url:
    title: Bucket URL
    description: The gs:// URL of the GCS bucket.
  bucket_self_link:
    title: Bucket Self Link
    description: The URI of the created bucket resource.
  bucket_location:
    title: Bucket Location
    description: The location of the bucket.
